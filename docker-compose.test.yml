version: '3.8'

services:
  mysql-test:
    image: mysql:8.0
    container_name: oms-mysql-test
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test123
      MYSQL_DATABASE: oms_test
      MYSQL_CHARSET: utf8mb4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    tmpfs:
      - /var/lib/mysql

  redis-test:
    image: redis:7-alpine
    container_name: oms-redis-test
    ports:
      - "6380:6379"
