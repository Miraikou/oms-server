<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">核心业务流程</text>

  <!-- === Sales Flow (top row) === -->
  <text x="60" y="90" font-size="13" font-weight="500" fill="#64748b">销售主线</text>

  <!-- 销售订单 -->
  <rect x="60" y="105" width="140" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">销售订单</text>
  <text x="130" y="148" text-anchor="middle" font-size="11" fill="#64748b">SO</text>

  <!-- Arrow -->
  <line x1="200" y1="133" x2="248" y2="133" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- 发货 -->
  <rect x="256" y="105" width="140" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="326" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">发货</text>
  <text x="326" y="148" text-anchor="middle" font-size="11" fill="#64748b">FH · FIFO 扣减库存</text>

  <!-- Arrow -->
  <line x1="396" y1="133" x2="444" y2="133" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- 收款 -->
  <rect x="452" y="105" width="140" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="522" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">收款</text>
  <text x="522" y="148" text-anchor="middle" font-size="11" fill="#64748b">SK · 多币种</text>

  <!-- Arrow -->
  <line x1="592" y1="133" x2="640" y2="133" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- 完成 -->
  <rect x="648" y="105" width="140" height="56" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="718" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">订单完成</text>
  <text x="718" y="148" text-anchor="middle" font-size="11" fill="#64748b">自动流转 · 计提提成</text>

  <!-- === After-sales (branch from 发货) === -->
  <text x="60" y="210" font-size="13" font-weight="500" fill="#64748b">售后</text>

  <!-- 客户退货 -->
  <rect x="256" y="220" width="140" height="56" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="326" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">客户退货</text>
  <text x="326" y="263" text-anchor="middle" font-size="11" fill="#64748b">TH · 四种类型</text>

  <!-- Arrow from 发货 down to 退货 -->
  <path d="M326,161 L326,212" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>

  <!-- 退款 -->
  <rect x="452" y="220" width="140" height="56" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="522" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">退款</text>
  <text x="522" y="263" text-anchor="middle" font-size="11" fill="#64748b">TK · 退货/直接退款</text>

  <!-- Arrow from 退货 to 退款 -->
  <line x1="396" y1="248" x2="444" y2="248" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Arrow from 退款 back to 收款 (dashed, upward) -->
  <path d="M522,220 L522,169" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
  <text x="535" y="198" font-size="10" fill="#94a3b8">冲抵</text>

  <!-- === Purchase & Inventory (bottom section) === -->
  <text x="60" y="330" font-size="13" font-weight="500" fill="#64748b">采购与库存</text>

  <!-- 采购订单 -->
  <rect x="60" y="345" width="140" height="56" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">采购订单</text>
  <text x="130" y="388" text-anchor="middle" font-size="11" fill="#64748b">CG · 向供应商补货</text>

  <!-- Arrow -->
  <line x1="200" y1="373" x2="248" y2="373" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 入库 -->
  <rect x="256" y="345" width="140" height="56" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="326" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">采购入库</text>
  <text x="326" y="388" text-anchor="middle" font-size="11" fill="#64748b">RK · 生成库存批次</text>

  <!-- Arrow -->
  <line x1="396" y1="373" x2="444" y2="373" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 库存 -->
  <rect x="452" y="345" width="140" height="56" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="522" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">库存</text>
  <text x="522" y="388" text-anchor="middle" font-size="11" fill="#64748b">批次管理 · 预警</text>

  <!-- Arrow from 库存 up to 发货 (support) -->
  <path d="M522,345 L522,310 Q522,295 507,295 L439,295 Q424,295 424,280 L424,190 Q424,175 409,175 L370,175 L370,161" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="473" y="289" text-anchor="middle" font-size="11" fill="#10b981">库存支撑发货</text>

  <!-- 采购退货 (branch) -->
  <rect x="256" y="435" width="140" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="326" y="460" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">采购退货</text>
  <text x="326" y="478" text-anchor="middle" font-size="11" fill="#64748b">PT · 扣减库存</text>

  <!-- Arrow from 入库 down to 采购退货 -->
  <path d="M326,401 L326,427" stroke="#ef4444" stroke-width="1.2" fill="none" marker-end="url(#arrow-red)"/>

  <!-- 库存调整 (branch) -->
  <rect x="452" y="435" width="140" height="56" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="522" y="460" text-anchor="middle" font-size="14" font-weight="600" fill="#7c3aed">库存调整</text>
  <text x="522" y="478" text-anchor="middle" font-size="11" fill="#64748b">KC · 盘盈/盘亏</text>

  <!-- Arrow from 库存 down to 库存调整 -->
  <path d="M522,401 L522,427" stroke="#8b5cf6" stroke-width="1.2" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- Legend -->
  <rect x="648" y="340" width="200" height="140" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="668" y="365" font-size="12" font-weight="500" fill="#475569">图例</text>
  <rect x="668" y="378" width="24" height="12" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="700" y="389" font-size="11" fill="#64748b">销售流程</text>
  <rect x="668" y="400" width="24" height="12" rx="3" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="700" y="411" font-size="11" fill="#64748b">采购与库存</text>
  <rect x="668" y="422" width="24" height="12" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="700" y="433" font-size="11" fill="#64748b">售后流程</text>
  <line x1="668" y1="452" x2="692" y2="452" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="700" y="456" font-size="11" fill="#64748b">关联/支撑关系</text>
  <line x1="668" y1="470" x2="692" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="474" font-size="11" fill="#64748b">流转方向</text>
</svg>
